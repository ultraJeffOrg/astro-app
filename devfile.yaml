schemaVersion: 2.2.0
metadata:
  name: astro-app
  version: 1.0.0
  displayName: astro-app
  description: An Astro JS static site deployed on OpenShift
  language: TypeScript
  projectType: Astro
  tags:
    - Astro
    - TypeScript
    - Frontend
parent:
  id: nodejs
  registryUrl: https://registry.devfile.io
components:
  - name: dev
    container:
      image: registry.access.redhat.com/ubi9/nodejs-22:latest
      endpoints:
        - name: http-astro
          targetPort: 4321
          exposure: public
          protocol: https
      memoryLimit: 1Gi
      mountSources: true
commands:
  - id: dev
    exec:
      component: dev
      commandLine: npm run dev
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true
