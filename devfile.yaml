schemaVersion: 2.2.0
metadata:
  name: astro-app
  version: 1.0.0
  displayName: astro-app
  description: An Astro JS static site deployed on OpenShift
  language: TypeScript
  projectType: Astro
  tags:
    - Astro
    - TypeScript
    - Frontend
components:
  - name: tools
    container:
      image: registry.access.redhat.com/ubi9/nodejs-22:latest
      endpoints:
        - name: http-astro
          targetPort: 4321
          exposure: public
          protocol: https
      memoryLimit: 1Gi
      mountSources: true
commands:
  - id: install
    exec:
      component: tools
      commandLine: npm install
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: false
  - id: build
    exec:
      component: tools
      commandLine: npm run build
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true
  - id: dev
    exec:
      component: tools
      commandLine: npm run dev
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true
